<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Father’s Day GitHub Test</title>
    <style>
        /* Modern CSS Reset & Variable Definitions */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-gradient: radial-gradient(circle at top left, #fffcf9 0%, #f5efe6 100%);
            --card-bg: #ffffff;
            --text-primary: #292524;
            --text-secondary: #57534e;
            --btn-gradient: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
            --btn-hover-gradient: linear-gradient(135deg, #ff5252 0%, #ff763b 100%);
            --shadow-color: rgba(120, 110, 90, 0.15);
            --accent-glow: rgba(255, 107, 107, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-primary);
        }

        /* Container & Card Design */
        .widget-container {
            width: 100%;
            max-width: 420px;
            perspective: 1000px;
        }

        .widget-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 10px 30px -5px var(--shadow-color), 
                        0 4px 12px -2px var(--shadow-color);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        .widget-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px -5px rgba(120, 110, 90, 0.22), 
                        0 6px 16px -2px rgba(120, 110, 90, 0.15);
        }

        /* Nostalgic Photo Icon Styling */
        .icon-container {
            width: 80px;
            height: 80px;
            background: #fffcf9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05), 0 4px 10px rgba(120, 110, 90, 0.1);
            border: 2px solid #e7dfd5;
        }

        .icon-container svg {
            width: 40px;
            height: 40px;
            fill: #d97706; /* Warm retro orange/amber */
        }

        /* Typography */
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.025em;
            color: var(--text-primary);
        }

        p {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text-secondary);
            margin-bottom: 28px;
            padding: 0 10px;
        }

        /* Vibrant Call-to-Action Button */
        .btn-celebrate {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 32px;
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
            background: var(--btn-gradient);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            outline: none;
            box-shadow: 0 6px 20px var(--accent-glow);
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        /* Shine effect overlay */
        .btn-celebrate::after {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.3) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-25deg);
            transition: 0.75s;
            opacity: 0;
        }

        .btn-celebrate:hover {
            background: var(--btn-hover-gradient);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .btn-celebrate:hover::after {
            opacity: 1;
            left: 125%;
            transition: all 0.75s ease-in-out;
        }

        .btn-celebrate:active {
            transform: translateY(1px);
            box-shadow: 0 3px 12px var(--accent-glow);
        }

        /* Custom focus indicator for accessibility */
        .btn-celebrate:focus-visible {
            box-shadow: 0 0 0 4px #fbcfe8, 0 6px 20px var(--accent-glow);
        }

        /* Footer Info */
        .widget-footer {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #a8a29e;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Responsive Breakpoints */
        @media (max-width: 480px) {
            .widget-card {
                padding: 28px 18px;
            }
            h1 {
                font-size: 1.35rem;
            }
            p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="widget-card">
            
            <!-- Illustrated Camera/Photo Icon -->
            <div class="icon-container">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/>
                </svg>
            </div>

            <!-- Title -->
            <h1>Father’s Day GitHub Test</h1>
            
            <!-- Description -->
            <p>Celebrate the memories. Tap the button below to view the treasured photo from the 1965 California trip.</p>
            
            <!-- Styled Button -->
            <button id="viewPicBtn" class="btn-celebrate" aria-label="Open Father's Day Picture">
                <span>Father’s Day Pic</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="7" y1="17" x2="17" y2="7"></line>
                    <polyline points="7 7 17 7 17 17"></polyline>
                </svg>
            </button>

            <!-- Footer Details -->
            <div class="widget-footer">
                daustinjr23 • my-widget-site
            </div>
            
        </div>
    </div>

    <!-- JavaScript Handler -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const button = document.getElementById('viewPicBtn');
            
            if (button) {
                button.addEventListener('click', () => {
                    // Properly URL-encoded raw direct link to the image
                    const imageUrl = "https://raw.githubusercontent.com/daustinjr23/my-widget-site/main/1965-07%20LDJ%20jda%20California%20Trip.jpg";
                    
                    // Securely open the image in a new tab
                    window.open(imageUrl, '_blank', 'noopener,noreferrer');
                });
            }
        });
    </script>
</body>
</html>
