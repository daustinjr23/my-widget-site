<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My GitHub Pages Widget</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f4f4f4;
      text-align: center;
    }
    button {
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      background: #0078d4;
      color: white;
      border-radius: 6px;
    }
    button:hover {
      background: #005fa3;
    }
  </style>
</head>
<body>

  <h1>Welcome to My GitHub Pages Site</h1>
  <p>Click the button below to open the image.</p>

  <button onclick="window.open('CalTrip.jpg', '_blank')">
    Open JPEG Image
  </button>

</body>
</html>
